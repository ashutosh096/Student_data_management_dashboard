<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .navbar {
            background: #0d6efd;
        }
        .navbar-brand {
            color: white;
            font-weight: bold;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <span class="navbar-brand">🎓 Student Management</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="text-center mb-4 text-warning">✏️ Edit Student</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" value="{{ student.name }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" value="{{ student.email }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Roll No</label>
                <input type="text" name="roll" value="{{ student.roll_no }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Course</label>
                <input type="text" name="course" value="{{ student.course }}" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">Update Student</button>
        </form>

        <a href="/" class="btn btn-secondary mt-3 w-100">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
