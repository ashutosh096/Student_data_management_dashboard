{% extends 'base.html' %}
{% block content %}
<h2>Students</h2>
<table border="1" cellpadding="5" cellspacing="0">
<tr>
    <th>Roll No</th>
    <th>Name</th>
    <th>Course</th>
    <th>Department</th>
    <th>Fees Paid</th>
</tr>
{% for student in students %}
<tr>
    <td>{{ student.roll_no }}</td>
    <td>{{ student.name }}</td>
    <td>{{ student.course }}</td>
    <td>{{ student.department.name }}</td>
    <td>{{ student.fees_paid }}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
