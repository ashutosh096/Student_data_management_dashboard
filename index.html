<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand text-white fw-bold">🎓 Student Management</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h3>Dashboard</h3>
        <a href="/add/" class="btn btn-success">+ Add Student</a>
    </div>

    <form method="GET" class="mb-3">
        <div class="input-group">
            <input type="text" name="q" class="form-control" placeholder="Search student">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <div class="card shadow">
        <div class="card-body">

            <table class="table text-center">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Roll</th>
                        <th>Course</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for s in students %}
                    <tr>
                        <td>{{ s.name }}</td>
                        <td>{{ s.email }}</td>
                        <td>{{ s.roll_no }}</td>
                        <td>{{ s.course }}</td>
                        <td>
                            <a href="/edit/{{ s.id }}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="/delete/{{ s.id }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
