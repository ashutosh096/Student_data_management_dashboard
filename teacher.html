{% extends 'base.html' %}
{% block content %}
<h2>Teachers</h2>
<table class="table table-bordered">
<tr><th>Name</th><th>Subject</th><th>Salary</th></tr>
{% for t in teachers %}
<tr>
    <td>{{ t.name }}</td>
    <td>{{ t.subject.name }}</td>
    <td>{{ t.salary }}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
